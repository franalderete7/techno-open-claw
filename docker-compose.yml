services:
  postgres:
    image: postgres:17
    container_name: techno-open-claw-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: postgres:17
    container_name: techno-open-claw-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db/migrations:/migrations:ro
    command:
      - /bin/sh
      - -lc
      - |
        set -eu
        until pg_isready -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"; do
          sleep 2
        done
        count=0
        for file in /migrations/*.sql; do
          [ -f "$$file" ] || continue
          echo "Applying $$(basename "$$file")"
          psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -v ON_ERROR_STOP=1 -f "$$file"
          count=$$((count + 1))
        done
        if [ "$$count" -eq 0 ]; then
          echo "No .sql files under /migrations; nothing to apply."
        fi

  api:
    build:
      context: ./apps/api
    container_name: techno-open-claw-api
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      API_BEARER_TOKEN: ${API_BEARER_TOKEN}
      DATABASE_URL: ${DATABASE_URL}
      UPLOADS_DIR: ${UPLOADS_DIR}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./data:/app/data

  web:
    build:
      context: ./apps/web
    container_name: techno-open-claw-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL}
      INTERNAL_API_BEARER_TOKEN: ${INTERNAL_API_BEARER_TOKEN}
      STOREFRONT_BASE_URL: ${STOREFRONT_BASE_URL:-https://technostoresalta.com}
      PORT: ${WEB_PORT:-3000}
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
