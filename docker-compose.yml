services:
  postgres:
    image: postgres:17
    container_name: techno-open-claw-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    container_name: techno-open-claw-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      API_BEARER_TOKEN: ${API_BEARER_TOKEN}
      DATABASE_URL: ${DATABASE_URL}
      UPLOADS_DIR: ${UPLOADS_DIR}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./data:/app/data

  web:
    build:
      context: ./apps/web
    container_name: techno-open-claw-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL}
      INTERNAL_API_BEARER_TOKEN: ${INTERNAL_API_BEARER_TOKEN}
      STOREFRONT_BASE_URL: ${STOREFRONT_BASE_URL:-https://technostoresalta.com}
      PORT: ${WEB_PORT:-3000}
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
